
@if (isClick) {

    <router-outlet></router-outlet>
}
@else {
<div class="create-course-page">
    
    <form #courseForm="ngForm" class="create-course-body" (ngSubmit)="next()">

        <div class="left">
             <div class="heading">
                <span class="root-text">Course</span>
                <span class="root-text"> > </span>
                <span class="next-text">Create course</span>
            </div>
            <div class="block">
                <label class="block-lable"> Title : </label>
                <input type="text" placeholder="New Course" name="title" [(ngModel)]="courseData.title" required>
                <mat-error *ngIf="courseForm.controls['title']?.invalid && courseForm.controls['title']?.touched">Title is required</mat-error>
            </div>

            <div class="bolck">
                <label class="block-lable"> Discription: </label>
               <div class="discription-box">
      <div class="discription-tool">
        <button type="button" class="btn btn-light" mat-icon-button (click)="execCmd('undo')">
          <mat-icon class="icon">undo</mat-icon>
        </button>
        <button type="button" class="btn btn-light" mat-icon-button (click)="execCmd('redo')">
          <mat-icon class="icon">redo</mat-icon>
        </button>
        <span class="divider"></span>
        <button mat-button type="button" class="select">
          Normal text
          <mat-icon>expand_more</mat-icon>
        </button>
        <span class="divider"></span>
        <button
          type="button"
          class="btn btn-light"
          mat-icon-button
          (click)="execCmd('insertUnorderedList')"
        >
          <mat-icon class="icon">format_list_bulleted</mat-icon>
        </button>
        <button type="button" class="btn btn-light" mat-icon-button (click)="text('bold')">
          <mat-icon class="icon">format_bold</mat-icon>
        </button>
        <button type="button" class="btn btn-light" mat-icon-button (click)="text('italic')">
          <mat-icon class="icon">format_italic</mat-icon>
        </button>
        <button type="button" class="btn btn-light" mat-icon-button (click)="text('underline')">
          <mat-icon class="icon">format_underlined</mat-icon>
        </button>
        <button
          type="button"
          class="btn btn-light"
          mat-icon-button
          (click)="execCmd('formatBlock', 'pre')"
        >
          <mat-icon class="icon">code</mat-icon>
        </button>
        <button type="button" class="btn btn-light" mat-icon-button (click)="insertLink()">
          <mat-icon class="icon">link</mat-icon>
        </button>
        <button type="button" class="btn btn-light" mat-icon-button (click)="insertImage()">
          <mat-icon class="icon">image</mat-icon>
        </button>
        <button
          type="button"
          class="btn btn-light"
          mat-icon-button
          (click)="execCmd('insertText', '&#123;&#125;')"
        >
          <mat-icon class="icon">data_object</mat-icon>
        </button>
        <button
          type="button"
          class="btn btn-light"
          mat-icon-button
          (click)="execCmd('formatBlock', 'blockquote')"
        >
          <mat-icon class="icon">format_quote</mat-icon>
        </button>
        <button
          type="button"
          class="btn btn-light"
          mat-icon-button
          (click)="execCmd('insertHorizontalRule')"
        >
          <mat-icon class="icon">remove</mat-icon>
        </button>
      </div>
      <div #editorArea contenteditable="true" class="text-area"></div>
    </div>
            </div>
            <div class="block">
                <div class="block-lable"> Options </div>
                <div class="option-block">
                    <div class="option-btn-box">
                        <button class="btn btn-light next option-btn">Genral</button>
                        <button class="btn btn-light next option-btn" >Content Drip</button>
                        <button class="btn btn-light next option-btn" >Endrol</button>
                    </div>
                    <br>

                    <label > Difficulty level</label>
                    <div class="option">
                        <select name="" id="">
                            <option value="" selected>Easy</option>
                            <option value="">Mediun</option>
                            <option value="">Hard</option>
                            
                        </select>
                    </div>
                    <div class="toggle">
                        <span>Public Course</span>
                        <mat-slide-toggle name="isPublicCourse" color="primary"></mat-slide-toggle>
                    </div>
                     <div class="toggle">
                        <span>Q & A</span>
                        <mat-slide-toggle name="isPublicCourse" color="primary"></mat-slide-toggle>
                    </div>
                </div>
            </div>
            <div>
                <button type="button" class="btn btn-light next" [disabled]="!courseForm.valid" (click)="next()"> Next</button>
            </div>
        </div>

        

        <div class="right">
            <div class="block">
                <label class="block-lable"> Author </label>
               <div class="auther-block">
                    <div>
                        <mat-icon>person</mat-icon>
                    </div>
                    <div class="info">
                       <span> Author Name</span>
                       <span> Author Email</span>

                    </div>
               </div>
            </div>
            <div class="block">
                <label  class="block-lable"> Visibility </label>
                <div class="option">
                    <select>
                    <option value="">Public</option>
                    <option value="">Private</option>

                </select>
                </div>
            </div>
            <div class="block">
                <div class="schedule-block">
                    <span>Schedule</span>
                    <mat-slide-toggle name="isPublicCourse" color="primary"></mat-slide-toggle>
                </div>
            </div>

            <div class="block">
                <label class="block-lable"> Featured Image </label>
                <div class="box">
                    <div class="box-upload">
                        <div *ngIf="thumbnail" class="box-upload__preview-wrap">
                            <img [src]="thumbnail" alt="Thumbnail preview" class="box-upload__img" />
                            <button class="btn btn-light remove-btn" (click)="removeThumbnail()">
                            <mat-icon>close</mat-icon>
                            </button>
                        </div>

                        <div *ngIf="!thumbnail" class="box-upload__preview-wrap">

                            <mat-icon>image</mat-icon>
                            <div>
                                <input type="file" style="display: none;" (change)='onFileSelect($event)'#fileInput  >
                                <button  class="btn btn-light next option-btn" (click)="fileInput.click()">Upload Thumnail</button>
                            </div>
                            <p>jpg, png, gif and web format up to ***MB</p>
                        </div>
                    </div> 
                </div>
            </div>
            <div class="block">
                <label class="block-lable"> Video Intro </label>
                <div class="box">
                    <div class="box-upload">
                         <div *ngIf="video" class="box-upload__preview-wrap">
                            <video [src]="video" controls class="box-upload__video"></video>
                            <button class="btn btn-light remove-btn" (click)="removeVideo()">
                            <mat-icon>close</mat-icon>
                            </button>
                        </div>

                        <div *ngIf="!video" class="box-upload__preview-wrap">
                            <mat-icon>videocam</mat-icon>
                            <div>
                            <input type="file" accept="video/*" style="display: none;" (change)="onVideoSelect($event)" #videoInput>
                            <button class="btn btn-light next option-btn" (click)="videoInput.click()">Upload video</button> 
                            </div>
                            <p>MP4, MOV, WEBM accepted up to 500MB</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="block">
                <label class="block-lable"> Pricing Model </label>
                <mat-radio-group aria-label="Select an option" name="pricing" [(ngModel)]="courseData.pricing" required>
                    <mat-radio-button value="free">Free</mat-radio-button>
                    <mat-radio-button value="paid">Paid</mat-radio-button>
                </mat-radio-group>
                <mat-error *ngIf="courseForm.controls['pricing']?.invalid && courseForm.controls['pricing']?.touched">Pricing Model is required</mat-error>
            </div>
            
             <div class="block">
                <label  class="block-lable"> Cateogry </label>
                <div class="option">
                    <select >
                    <option value="">Public</option>
                    <option value="">Password Protected</option>

                    <option value="">Private</option>

                </select>
                </div>
            </div>

             <div class="block">
                <label  class="block-lable"> Tags </label>
                <div class="option">
                    <select>
                    <option value="">Public</option>
                    <option value="">Private</option>
                </select>
                </div>
            </div>
        </div>    
    <!-- </div> -->
    </form>
</div>
}
