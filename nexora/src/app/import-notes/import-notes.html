<div class="container">

    <div class="imports-1">
  <div class="select-import">
    <div><p>Class</p></div>
    <div class="select-import-block">
      <select [(ngModel)]="selectedClass" (change)="onClassChange()">
        <option value="" selected disabled>select class</option>
        @for (item of allData; track item.className) {
          <option [value]="item.className">Class {{ item.className }}</option>
        }
      </select>
    </div>
  </div>

  <div class="select-import">
    <div><p>Subject</p></div>
    <div class="select-import-block">
      <select [(ngModel)]="selectedSubject" (change)="onSubjectChange()" [disabled]="!selectedClass">
        <option value="" selected disabled>select subject</option>
        @for (sub of availableSubjects; track sub.subject) {
          <option [value]="sub.subject">{{ sub.subject }}</option>
        }
      </select>
    </div>
  </div>

  <div class="select-import">
    <div><p>Chapter</p></div>
    <div class="select-import-block">
      <select [(ngModel)]="selectedChapter" (change)="onChapterChange()" [disabled]="!selectedSubject">
        <option value="" selected disabled>select chapter</option>
        @for (ch of availableChapters; track ch.chapterName) {
          <option [value]="ch.chapterName">{{ ch.chapterName }}</option>
        }
      </select>
    </div>
  </div>

  <div class="select-import">
    <div><p>Topics</p></div>
    <div class="select-import-block">
      <select [(ngModel)]="selectedTopics" [disabled]="!selectedChapter">
        <option value="" selected disabled>select Topics</option>
        @for (topic of availableTopics; track topic.topicName) {
          <option [value]="topic.topicName">{{ topic.topicName }}</option>
        }
      </select>
    </div>
  </div>
</div>


@if (availableTopics.length) {
  <div class="topics-list">
    @for (topic of availableTopics; track topic.topicName) {
        <div class="topics-box">
            <div class="checkbox">
                <input type="checkbox">
            </div>  
                <div class="topic-item">
                <h4>{{ topic.topicName }}</h4>
                <p>{{ topic.content }}</p>
            </div>
        </div>
    }
  </div>
}

<div style="display: flex; justify-content: center; gap: 15px;">
    <button type="button"class="btn btn-outline-dark"> Cancle</button>
    <button type="submit"class="btn add-lecture-btn" (click)="onClick()"> Add lecture </button>
</div>


</div>
