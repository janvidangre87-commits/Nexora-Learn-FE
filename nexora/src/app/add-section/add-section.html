@if (!isModule) {
  <div class="container">
    <form #sectionForm="ngForm">
      <div class="block">
        <label class="block-lable"> Title : </label>
        <input
          type="text"
          placeholder="New Course"
          name="title"
          [(ngModel)]="sectionData.title"
          required
        />
      </div>

      <div class="bolck">
        <label class="block-lable"> Discription: </label>
        <div class="discription-box">
          <div class="discription-tool">
            <button type="button" class="btn btn-light" mat-icon-button (click)="execCmd('undo')">
              <mat-icon class="icon">undo</mat-icon>
            </button>
            <button type="button" class="btn btn-light" mat-icon-button (click)="execCmd('redo')">
              <mat-icon class="icon">redo</mat-icon>
            </button>
            <span class="divider"></span>
            <button mat-button type="button" class="select">
              Normal text
              <mat-icon>expand_more</mat-icon>
            </button>
            <span class="divider"></span>
            <button
              type="button"
              class="btn btn-light"
              mat-icon-button
              (click)="execCmd('insertUnorderedList')"
            >
              <mat-icon class="icon">format_list_bulleted</mat-icon>
            </button>
            <button type="button" class="btn btn-light" mat-icon-button (click)="text('bold')">
              <mat-icon class="icon">format_bold</mat-icon>
            </button>
            <button type="button" class="btn btn-light" mat-icon-button (click)="text('italic')">
              <mat-icon class="icon">format_italic</mat-icon>
            </button>
            <button type="button" class="btn btn-light" mat-icon-button (click)="text('underline')">
              <mat-icon class="icon">format_underlined</mat-icon>
            </button>
            <button
              type="button"
              class="btn btn-light"
              mat-icon-button
              (click)="execCmd('formatBlock', 'pre')"
            >
              <mat-icon class="icon">code</mat-icon>
            </button>
            <button type="button" class="btn btn-light" mat-icon-button (click)="insertLink()">
              <mat-icon class="icon">link</mat-icon>
            </button>
            <button type="button" class="btn btn-light" mat-icon-button (click)="insertImage()">
              <mat-icon class="icon">image</mat-icon>
            </button>
            <button
              type="button"
              class="btn btn-light"
              mat-icon-button
              (click)="execCmd('insertText', '&#123;&#125;')"
            >
              <mat-icon class="icon">data_object</mat-icon>
            </button>
            <button
              type="button"
              class="btn btn-light"
              mat-icon-button
              (click)="execCmd('formatBlock', 'blockquote')"
            >
              <mat-icon class="icon">format_quote</mat-icon>
            </button>
            <button
              type="button"
              class="btn btn-light"
              mat-icon-button
              (click)="execCmd('insertHorizontalRule')"
            >
              <mat-icon class="icon">remove</mat-icon>
            </button>
          </div>
          <div #editorArea contenteditable="true" class="text-area"></div>
        </div>
      </div>
      <div style="display: flex; justify-content: center; margin-top: 25px">
        <button
          class="btn new-section-btn"
          type="button"
          (click)="module()"
          [disabled]="!sectionForm.valid"
        >
          Create new section and move futher
        </button>
      </div>
    </form>
  </div>
}
